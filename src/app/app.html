<header class="site-header">
  <a class="brand" routerLink="/" aria-label="Ir al inicio" (click)="closeMenu()">
    <span>
      <strong>Vladimir Huarachi Copa</strong>
      <small>Polit&oacute;logo &middot; Art&iacute;culos y pensamiento</small>
    </span>
  </a>

  <button
    class="menu-toggle"
    type="button"
    aria-label="Abrir menú de navegación"
    [attr.aria-expanded]="menuOpen()"
    aria-controls="main-navigation"
    (click)="toggleMenu()"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav id="main-navigation" [class.open]="menuOpen()" aria-label="Navegaci&oacute;n principal">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Inicio</a>
    <a routerLink="/articulos" routerLinkActive="active" (click)="closeMenu()">Art&iacute;culos</a>
    <a routerLink="/sobre-el-autor" routerLinkActive="active" (click)="closeMenu()">Sobre el autor</a>
  </nav>
</header>
<main><router-outlet /></main>
<footer class="site-footer">
  <div>
    <strong>Vladimir Huarachi Copa</strong>
    <p>Un espacio para compartir ideas, an&aacute;lisis y memoria.</p>
  </div>
  <div class="footer-meta">
    <p>&copy; 2026 &middot; Todos los derechos reservados</p>
    <p class="footer-dev">
      Dise&ntilde;ado y desarrollado por
      <a
        href="https://www.instagram.com/andeanwolvesengineering/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Andean Wolves Engineering
      </a>
    </p>
  </div>
</footer>
